  diagram: [

    { label:'toggleFavorite(id) → _favorites.update { }', detail:'atomic add / remove', fact:'toggle' },

  starter:
'// One ViewModel, one source of truth for favorites that MANY screens observe.\n' +
'// Expose a read-only StateFlow<Set<Int>>; mutate it atomically with update { }.\n' +

  solution:
'private val _favorites = MutableStateFlow<Set<Int>>(emptySet())\n' +
'val favorites: StateFlow<Set<Int>> = _favorites.asStateFlow()\n' +
'\n' +
'fun toggleFavorite(id: Int) {\n' +
'    _favorites.update { current ->\n' +
'        if (id in current) current - id else current + id\n' +
'    }\n' +
